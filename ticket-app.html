<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>チケット</title>

<!-- PWA設定 -->
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; }
  body {
    background: #7F77DD;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding: env(safe-area-inset-top,0px) env(safe-area-inset-right,0px) env(safe-area-inset-bottom,0px) env(safe-area-inset-left,0px);
  }
  .app {
    width: 100%;
    max-width: 390px;
    background: #fff;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
  }
  @media (min-width: 430px) {
    body { padding: 20px; align-items: center; background: #f0f0f5; }
    .app { min-height: auto; border-radius: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.12); }
  }
  .screen { display: none; flex-direction: column; }
  .screen.active { display: flex; }
  .top-bar { padding: 16px 20px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid #e0e0e0; }
  .top-bar h1 { font-size: 17px; font-weight: 600; color: #111; }
  .back-btn { font-size: 14px; color: #7F77DD; cursor: pointer; }
  .tab-bar { display: flex; border-bottom: 0.5px solid #e0e0e0; padding: 0 20px; }
  .tab { flex: 1; text-align: center; padding: 10px 0; font-size: 13px; color: #888; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.active { color: #7F77DD; border-bottom-color: #7F77DD; font-weight: 600; }
  .ticket-grid { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
  .ticket-card { border-radius: 16px; padding: 16px; cursor: pointer; color: white; position: relative; overflow: hidden; min-height: 100px; }
  .tc-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 16px; opacity: 0.4; object-fit: cover; }
  .tc-content { position: relative; z-index: 1; }
  .ticket-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .ticket-sub { font-size: 12px; opacity: 0.8; margin-bottom: 12px; }
  .ticket-footer { display: flex; justify-content: space-between; align-items: center; }
  .ticket-badge { font-size: 11px; font-weight: 600; background: rgba(255,255,255,0.25); padding: 3px 8px; border-radius: 20px; }
  .fab { margin: 0 20px 20px auto; width: 52px; height: 52px; border-radius: 50%; background: #7F77DD; border: none; color: white; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .create-form { padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
  .field-label { font-size: 12px; color: #666; margin-bottom: 4px; }
  .field-input { width: 100%; font-size: 14px; padding: 10px 12px; border: 1px solid #ddd; border-radius: 10px; background: #fff; color: #111; outline: none; }
  .field-input:focus { border-color: #7F77DD; }
  .color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
  .color-dot.selected { border-color: #111; }
  .submit-btn { background: #7F77DD; color: white; border: none; border-radius: 14px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 4px; }
  .img-section { border: 1px solid #e0e0e0; border-radius: 14px; overflow: hidden; }
  .canvas-wrap { width: 100%; height: 130px; background: #f5f5f5; position: relative; }
  .draw-canvas { touch-action: none; display: block; width: 100%; height: 130px; }
  .img-tools { display: flex; border-top: 1px solid #e0e0e0; }
  .img-tool-btn { flex: 1; padding: 9px 4px; font-size: 12px; color: #666; cursor: pointer; text-align: center; border: none; background: none; border-right: 1px solid #e0e0e0; }
  .img-tool-btn:last-child { border-right: none; }
  .img-tool-btn.active { color: #7F77DD; font-weight: 600; background: #f5f4ff; }
  .brush-row { display: flex; gap: 8px; align-items: center; padding: 8px 12px; border-top: 1px solid #e0e0e0; flex-wrap: wrap; }
  .brush-color { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
  .brush-color.selected { border-color: #111; }
  .sticker-row { display: flex; gap: 6px; flex-wrap: wrap; padding: 8px 12px; border-top: 1px solid #e0e0e0; }
  .sticker { font-size: 22px; cursor: pointer; padding: 4px; border-radius: 8px; }
  .sticker:hover { background: #f0f0f0; }
  .ai-panel { padding: 12px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid #e0e0e0; }
  .ai-input-row { display: flex; gap: 8px; }
  .ai-input { flex: 1; font-size: 13px; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #111; outline: none; }
  .ai-gen-btn { background: #7F77DD; color: white; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .ai-gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .ai-status { font-size: 12px; color: #888; text-align: center; min-height: 16px; }
  .count-row { display: flex; align-items: center; gap: 12px; }
  .count-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #111; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .count-val { font-size: 16px; font-weight: 600; color: #111; min-width: 24px; text-align: center; }
  .big-ticket { margin: 16px 20px; border-radius: 20px; padding: 24px; position: relative; overflow: hidden; min-height: 180px; }
  .bt-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
  .bt-bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 20px; opacity: 0.45; }
  .bt-content { position: relative; z-index: 1; }
  .bt-title { font-size: 22px; font-weight: 700; color: white; margin-bottom: 4px; }
  .bt-sub { font-size: 14px; color: rgba(255,255,255,0.85); margin-bottom: 16px; }
  .qr-box { background: white; border-radius: 12px; padding: 10px; display: inline-block; margin-bottom: 12px; }
  .use-btn { background: rgba(255,255,255,0.25); border: none; border-radius: 12px; padding: 10px 20px; color: white; font-size: 13px; font-weight: 600; cursor: pointer; }
  .detail-actions { padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
  .action-btn { border: 1px solid #ddd; border-radius: 12px; padding: 13px; font-size: 14px; cursor: pointer; text-align: center; background: #fff; color: #111; }
  .action-btn.primary { background: #7F77DD; color: white; border-color: #7F77DD; font-weight: 600; }
  .share-modal-wrap { min-height: 480px; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; padding: 20px; }
  .share-modal { background: #fff; border-radius: 20px; padding: 24px; width: 100%; max-width: 320px; }
  .share-modal h2 { font-size: 17px; font-weight: 600; color: #111; margin-bottom: 4px; }
  .share-qr-wrap { display: flex; justify-content: center; margin-bottom: 16px; background: white; padding: 12px; border-radius: 12px; border: 1px solid #eee; }
  .share-link-box { background: #f5f5f5; border-radius: 10px; padding: 10px 12px; font-size: 12px; color: #666; word-break: break-all; margin-bottom: 12px; border: 1px solid #e0e0e0; }
  .copy-btn { width: 100%; background: #7F77DD; color: white; border: none; border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
  .copy-btn.copied { background: #1D9E75; }
  .close-share-btn { width: 100%; background: none; border: 1px solid #ddd; border-radius: 12px; padding: 12px; font-size: 14px; cursor: pointer; color: #111; }
  .empty { text-align: center; padding: 48px 20px; color: #aaa; font-size: 14px; }
</style>

  </div>

  <!-- 新規作成画面 -->

    <div class="top-bar">
      <span class="back-btn" onclick="goHome()">← 戻る</span>

      <span></span>
    </div>

      <div><div class="field-label">説明</div><input class="field-input" placeholder="例: スタバで使えます" id="new-desc"/></div>
      <div>

          <div class="color-dot" style="background:linear-gradient(135deg,#1D9E75,#5DCAA5)" onclick="selectColor(1,this)"></div>
          <div class="color-dot" style="background:linear-gradient(135deg,#D4537E,#ED93B1)" onclick="selectColor(2,this)"></div>
          <div class="color-dot" style="background:linear-gradient(135deg,#378ADD,#85B7EB)" onclick="selectColor(3,this)"></div>
          <div class="color-dot" style="background:linear-gradient(135deg,#BA7517,#EF9F27)" onclick="selectColor(4,this)"></div>
          <div class="color-dot" style="background:linear-gradient(135deg,#D85A30,#F0997B)" onclick="selectColor(5,this)"></div>
        </div>
      </div>
      <div>
        <div class="field-label" style="margin-bottom:8px">チケット画像</div>
        <div class="img-section">

          <div class="img-tools">
            <button class="img-tool-btn active" id="tool-draw" onclick="setTool('draw')">✏️ 描く</button>
            <button class="img-tool-btn" id="tool-sticker" onclick="setTool('sticker')">🌟 スタンプ</button>
            <button class="img-tool-btn" id="tool-ai" onclick="setTool('ai')">✨ AI生成</button>

            <div class="brush-color" style="background:#D4537E" onclick="setBrushColor('#D4537E',this)"></div>
            <div class="brush-color" style="background:#1D9E75" onclick="setBrushColor('#1D9E75',this)"></div>
            <div class="brush-color" style="background:#EF9F27" onclick="setBrushColor('#EF9F27',this)"></div>
            <div class="brush-color" style="background:#378ADD" onclick="setBrushColor('#378ADD',this)"></div>
            <div class="brush-color" style="background:#E24B4A" onclick="setBrushColor('#E24B4A',this)"></div>
            <div class="brush-color" style="background:#fff;border:1px solid #ccc" onclick="setBrushColor('#ffffff',this)"></div>
            <div style="font-size:12px;color:#666;display:flex;align-items:center;gap:6px">太さ<input type="range" min="2" max="20" value="5" step="1" style="width:56px" oninput="brushSize=+this.value"/></div>
          </div>
          <div id="sticker-panel" style="display:none">

              <span class="sticker" onclick="placeSticker('🎉')">🎉</span>
              <span class="sticker" onclick="placeSticker('🌸')">🌸</span>
              <span class="sticker" onclick="placeSticker('⭐')">⭐</span>
              <span class="sticker" onclick="placeSticker('🎈')">🎈</span>
              <span class="sticker" onclick="placeSticker('🍀')">🍀</span>
              <span class="sticker" onclick="placeSticker('🦄')">🦄</span>
              <span class="sticker" onclick="placeSticker('🍕')">🍕</span>
              <span class="sticker" onclick="placeSticker('🎸')">🎸</span>
              <span class="sticker" onclick="placeSticker('🌈')">🌈</span>
              <span class="sticker" onclick="placeSticker('💖')">💖</span>
              <span class="sticker" onclick="placeSticker('🏆')">🏆</span>
              <span class="sticker" onclick="placeSticker('🎀')">🎀</span>

      <button class="submit-btn" onclick="createTicket()">チケットを作成</button>

  <!-- 詳細画面 -->
  <div class="screen" id="detail-screen">
    <div class="top-bar">
      <span class="back-btn" onclick="goHome()">← 戻る</span>
      <h1>チケット詳細</h1>
      <span></span>
    </div>
    <div>

<script>
// ============================================================
// データ
// ============================================================
const COLOR_GRADS = [
  ['#7F77DD','#AFA9EC'],
  ['#1D9E75','#5DCAA5'],
  ['#D4537E','#ED93B1'],
  ['#378ADD','#85B7EB'],
  ['#BA7517','#EF9F27'],
  ['#D85A30','#F0997B']
];

let tickets = [
  { title:'映画チケット', desc:'シネコンで使用可', expiry:'2025-08-31', total:2, used:0, color:0, imgData:null },
  { title:'ランチおごり券', desc:'好きなランチを奢ります', expiry:'', total:3, used:2, color:1, imgData:null },
  { title:'誕生日スペシャル', desc:'お誕生日おめでとう！', expiry:'2025-05-15', total:1, used:1, color:2, imgData:null },
];

let currentTicket = 0;
let newCount = 1;
let selectedColor = 0;

// ============================================================
// キャンバス描画
// ============================================================
const canvas = document.getElementById('draw-canvas');
const ctx = canvas.getContext('2d');
let brushColor = '#7F77DD', brushSize = 5, drawing = false, lastX = 0, lastY = 0, currentTool = 'draw';

function getPos(e, c) {
  const r = c.getBoundingClientRect(), sx = c.width / r.width, sy = c.height / r.height;
  const s = e.touches ? e.touches[0] : e;
  return [(s.clientX - r.left) * sx, (s.clientY - r.top) * sy];
}

canvas.addEventListener('mousedown', e => { if (currentTool !== 'draw') return; drawing = true; [lastX, lastY] = getPos(e, canvas); });
canvas.addEventListener('mousemove', e => {
  if (!drawing || currentTool !== 'draw') return;
  const [x, y] = getPos(e, canvas);
  ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y);
  ctx.strokeStyle = brushColor; ctx.lineWidth = brushSize; ctx.lineCap = 'round'; ctx.stroke();
  [lastX, lastY] = [x, y];
});
canvas.addEventListener('mouseup', () => drawing = false);
canvas.addEventListener('mouseleave', () => drawing = false);
canvas.addEventListener('touchstart', e => { e.preventDefault(); if (currentTool !== 'draw') return; drawing = true; [lastX, lastY] = getPos(e, canvas); }, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!drawing || currentTool !== 'draw') return;
  const [x, y] = getPos(e, canvas);
  ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y);
  ctx.strokeStyle = brushColor; ctx.lineWidth = brushSize; ctx.lineCap = 'round'; ctx.stroke();
  [lastX, lastY] = [x, y];
}, { passive: false });
canvas.addEventListener('touchend', () => drawing = false);

function setTool(t) {
  currentTool = t;
  ['draw', 'sticker', 'ai'].forEach(id => {
    const b = document.getElementById('tool-' + id);
    if (b) b.classList.toggle('active', id === t);
  });
  document.getElementById('draw-panel').style.display = t === 'draw' ? 'flex' : 'none';
  document.getElementById('sticker-panel').style.display = t === 'sticker' ? 'block' : 'none';
  document.getElementById('ai-panel').style.display = t === 'ai' ? 'flex' : 'none';
}

function setBrushColor(c, el) {
  brushColor = c;
  document.querySelectorAll('.brush-color').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
}

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  document.getElementById('ai-status').textContent = '';
}

function placeSticker(e) {
  const x = 40 + Math.random() * (canvas.width - 80), y = 20 + Math.random() * (canvas.height - 40);
  ctx.font = '40px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(e, x, y);
}

// ============================================================
// AI画像生成（テーマ別ローカル描画 + API fallback）
// ============================================================
const THEMES = {
  '桜': (c, x) => drawFlower(c, x, ['#FFB7C5','#FF8FAB','#FFC0CB','#FF69B4']),
  '海': drawOcean,
  '宇宙': drawSpace,
  '花火': drawFireworks,
  '星': drawStars,
  '虹': drawRainbow,
  '森': (c, x) => drawFlower(c, x, ['#228B22','#32CD32','#90EE90','#006400']),
  '夕焼け': drawSunset,
};

function drawFlower(c, ctx, colors) {
  const w = c.width, h = c.height;
  const g = ctx.createLinearGradient(0, 0, w, h);
  g.addColorStop(0, colors[0]); g.addColorStop(1, colors[2]);
  ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < 30; i++) {
    const x = Math.random() * w, y = Math.random() * h, r = 3 + Math.random() * 8;
    ctx.beginPath();
    for (let p = 0; p < 5; p++) ctx.ellipse(x + Math.cos(p * Math.PI * 2 / 5) * r, y + Math.sin(p * Math.PI * 2 / 5) * r, r * 0.6, r * 0.3, p * Math.PI * 2 / 5, 0, Math.PI * 2);
    ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)] + 'cc'; ctx.fill();
  }
}

function drawOcean(c, ctx) {
  const w = c.width, h = c.height;
  const g = ctx.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0, '#87CEEB'); g.addColorStop(0.5, '#1E90FF'); g.addColorStop(1, '#006994');
  ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < 8; i++) {
    const y = h * 0.4 + i * 8;
    ctx.beginPath(); ctx.moveTo(0, y);
    for (let x = 0; x < w; x += 20) ctx.quadraticCurveTo(x + 10, y - 6 + Math.random() * 4, x + 20, y);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 2; ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(w * 0.8, h * 0.2, 20, 0, Math.PI * 2);
  ctx.fillStyle = '#FFD700'; ctx.fill();
}

function drawSpace(c, ctx) {
  const w = c.width, h = c.height;
  ctx.fillStyle = '#0a0a2e'; ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < 80; i++) {
    const x = Math.random() * w, y = Math.random() * h, r = Math.random() * 2;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${0.4 + Math.random() * 0.6})`; ctx.fill();
  }
  const pg = ctx.createRadialGradient(w * 0.75, h * 0.3, 2, w * 0.75, h * 0.3, 25);
  pg.addColorStop(0, '#6cf'); pg.addColorStop(1, '#36a');
  ctx.beginPath(); ctx.arc(w * 0.75, h * 0.3, 25, 0, Math.PI * 2);
  ctx.fillStyle = pg; ctx.fill();
}

function drawFireworks(c, ctx) {
  const w = c.width, h = c.height;
  ctx.fillStyle = '#111'; ctx.fillRect(0, 0, w, h);
  const colors = ['#FF4500','#FFD700','#00FFFF','#FF69B4','#7FFF00'];
  for (let f = 0; f < 5; f++) {
    const cx = 40 + Math.random() * (w - 80), cy = 20 + Math.random() * (h - 40), rays = 12 + Math.floor(Math.random() * 8);
    const col = colors[Math.floor(Math.random() * colors.length)];
    for (let r = 0; r < rays; r++) {
      const angle = r * (Math.PI * 2 / rays), len = 20 + Math.random() * 25;
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + Math.cos(angle) * len, cy + Math.sin(angle) * len);
      ctx.strokeStyle = col + 'cc'; ctx.lineWidth = 1.5; ctx.stroke();
    }
  }
}

function drawStars(c, ctx) {
  const w = c.width, h = c.height;
  const g = ctx.createLinearGradient(0, 0, w, h);
  g.addColorStop(0, '#1a1a3e'); g.addColorStop(1, '#2d1b5e');
  ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < 20; i++) {
    const x = Math.random() * w, y = Math.random() * h, s = 4 + Math.random() * 8;
    drawStar(ctx, x, y, s, '#FFD700');
  }
}

function drawStar(ctx, x, y, r, color) {
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = i * Math.PI * 2 / 5 - Math.PI / 2, b = a + Math.PI / 5;
    ctx.lineTo(x + Math.cos(a) * r, y + Math.sin(a) * r);
    ctx.lineTo(x + Math.cos(b) * r * 0.4, y + Math.sin(b) * r * 0.4);
  }
  ctx.closePath(); ctx.fillStyle = color; ctx.fill();
}

function drawRainbow(c, ctx) {
  const w = c.width, h = c.height;
  const g = ctx.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0, '#87CEEB'); g.addColorStop(1, '#B0E0E6');
  ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
  ['#FF0000','#FF7F00','#FFFF00','#00FF00','#0000FF','#4B0082','#EE82EE'].forEach((col, i) => {
    ctx.beginPath(); ctx.arc(w / 2, h + 20, h * 0.9 - i * 12, Math.PI, 0);
    ctx.strokeStyle = col + 'cc'; ctx.lineWidth = 10; ctx.stroke();
  });
}

function drawSunset(c, ctx) {
  const w = c.width, h = c.height;
  const g = ctx.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0, '#FF6B35'); g.addColorStop(0.4, '#F7C59F'); g.addColorStop(0.7, '#EFEFD0'); g.addColorStop(1, '#004E89');
  ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
  ctx.beginPath(); ctx.arc(w / 2, h * 0.65, 35, Math.PI, 0);
  const sg = ctx.createRadialGradient(w / 2, h * 0.65, 5, w / 2, h * 0.65, 35);
  sg.addColorStop(0, '#FFD700'); sg.addColorStop(1, '#FF4500');
  ctx.fillStyle = sg; ctx.fill();
}

function drawGenericPattern(prompt) {
  const w = canvas.width, h = canvas.height;
  let hash = 0;
  for (let i = 0; i < prompt.length; i++) hash = ((hash << 5) - hash) + prompt.charCodeAt(i);
  const hue = Math.abs(hash) % 360;
  const g = ctx.createLinearGradient(0, 0, w, h);
  g.addColorStop(0, `hsl(${hue},70%,60%)`);
  g.addColorStop(0.5, `hsl(${(hue + 60) % 360},70%,55%)`);
  g.addColorStop(1, `hsl(${(hue + 120) % 360},70%,50%)`);
  ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < 25; i++) {
    ctx.beginPath(); ctx.arc(Math.random() * w, Math.random() * h, 5 + Math.random() * 20, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${(hue + 180) % 360},80%,80%,0.3)`; ctx.fill();
  }
  ctx.font = 'bold 18px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(prompt.slice(0, 8), w / 2, h / 2);
}

async function generateAIImage() {
  const prompt = document.getElementById('ai-prompt').value.trim();
  if (!prompt) { document.getElementById('ai-status').textContent = 'キーワードを入力してください'; return; }
  const btn = document.getElementById('ai-btn');
  btn.disabled = true;
  document.getElementById('ai-status').textContent = '生成中... ✨';

  const localFn = Object.entries(THEMES).find(([k]) => prompt.includes(k));
  if (localFn) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    localFn[1](canvas, ctx);
    document.getElementById('ai-status').textContent = '生成完了！ ✓';
    btn.disabled = false;
    return;
  }

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 800,
        system: 'Output ONLY a JavaScript function body that draws on canvas context "ctx". Canvas is 340x130. Use ctx methods only. No comments, no function declaration. Will run as: (function(ctx,w,h){ YOUR_CODE })(ctx,340,130)',
        messages: [{ role: 'user', content: 'Draw colorful background for: ' + prompt }]
      })
    });
    const data = await res.json();
    let code = data.content?.[0]?.text?.trim() || '';
    code = code.replace(/```[\w]*/g, '').replace(/```/g, '').trim();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    try {
      new Function('ctx', 'w', 'h', code)(ctx, 340, 130);
      document.getElementById('ai-status').textContent = '生成完了！ ✓';
    } catch (e) {
      drawGenericPattern(prompt);
      document.getElementById('ai-status').textContent = 'パターンで生成しました ✓';
    }
  } catch (e) {
    drawGenericPattern(prompt);
    document.getElementById('ai-status').textContent = 'パターンで生成しました ✓';
  }
  btn.disabled = false;
}

// ============================================================
// チケット操作
// ============================================================
function selectColor(i, el) {
  selectedColor = i;
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
}

function changeCount(d) {
  newCount = Math.max(1, Math.min(10, newCount + d));
  document.getElementById('count-display').textContent = newCount;
}

function createTicket() {
  const title = document.getElementById('new-title').value.trim();
  if (!title) { alert('チケット名を入力してください'); return; }
  const desc = document.getElementById('new-desc').value.trim();
  const expiry = document.getElementById('new-expiry').value || '';
  const imgData = canvas.toDataURL();
  tickets.unshift({ title, desc, expiry, total: newCount, used: 0, color: selectedColor, imgData });
  saveTickets();
  goHome();
}

function openDetail(i) {
  currentTicket = i;
  const t = tickets[i];
  const remain = t.total - t.used;
  document.getElementById('detail-title').textContent = t.title;
  document.getElementById('detail-desc').textContent = t.desc;
  const expiryStr = t.expiry ? '有効期限: ' + t.expiry : '有効期限: 無制限';
  document.getElementById('detail-expiry').textContent = expiryStr;
  document.getElementById('detail-color-overlay').style.background =
    `linear-gradient(135deg,${COLOR_GRADS[t.color][0]},${COLOR_GRADS[t.color][1]})`;
  document.getElementById('remain-info').textContent = `残り ${remain} / ${t.total} 枚`;
  const bgC = document.getElementById('detail-bg-canvas');
  if (t.imgData) {
    const img = new Image();
    img.onload = () => {
      const bc = bgC.getContext('2d');
      bgC.width = 340; bgC.height = 180;
      bc.drawImage(img, 0, 0, 340, 180);
    };
    img.src = t.imgData;
    bgC.style.display = 'block';
  } else {
    bgC.style.display = 'none';
  }
  drawQR('qr-svg', 90, t.title + i);
  showScreen('detail-screen');
}

function useTicket() {
  const t = tickets[currentTicket];
  if (t.total - t.used <= 0) { alert('このチケットは使用済みです'); return; }
  if (confirm('このチケットを1枚使用しますか？')) {
    t.used++;
    document.getElementById('remain-info').textContent = `残り ${t.total - t.used} / ${t.total} 枚`;
    saveTickets();
  }
}

// ============================================================
// 共有機能
// ============================================================
function openShare() {
  const t = tickets[currentTicket];
  document.getElementById('share-title').textContent = t.title;
  document.getElementById('share-sub').textContent = `「${t.desc || t.title}」を友達に送ります`;
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify({ title: t.title, desc: t.desc, total: t.total, color: t.color }))));
  document.getElementById('share-link-text').textContent = `https://ticket-app.example.com/receive?t=${encoded.slice(0, 36)}...`;
  drawShareQR(t.title + currentTicket);
  document.getElementById('copy-btn').textContent = 'リンクをコピー 📋';
  document.getElementById('copy-btn').classList.remove('copied');
  showScreen('share-screen');
}

function copyLink() {
  const btn = document.getElementById('copy-btn');
  btn.textContent = 'コピーしました ✓';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'リンクをコピー 📋'; btn.classList.remove('copied'); }, 2500);
}

function shareLine() {
  const t = tickets[currentTicket];
  const msg = `🎟「${t.title}」チケット\n${t.desc}\nhttps://ticket-app.example.com/receive?ticket=${encodeURIComponent(t.title)}`;
  window.open(`https://line.me/R/msg/text/?${encodeURIComponent(msg)}`);
}

function shareSMS() {
  const t = tickets[currentTicket];
  const msg = `🎟「${t.title}」チケット https://ticket-app.example.com/receive?ticket=${encodeURIComponent(t.title)}`;
  window.open(`sms:?body=${encodeURIComponent(msg)}`);
}

// ============================================================
// QRコード描画
// ============================================================
function drawQR(id, size, seed) {
  const svg = document.getElementById(id);
  svg.innerHTML = '';
  const n = 9, cell = Math.floor(size / n);
  let h = 0;
  for (let i = 0; i < seed.length; i++) h = ((h << 5) - h) + seed.charCodeAt(i);
  for (let r = 0; r < n; r++) for (let c = 0; c < n; c++) {
    const corner = (r < 3 && c < 3) || (r < 3 && c > n - 4) || (r > n - 4 && c < 3);
    if (corner || !!(Math.abs(h ^ (r * 17 + c * 31)) % 3)) {
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', c * cell + 1); rect.setAttribute('y', r * cell + 1);
      rect.setAttribute('width', cell - 1); rect.setAttribute('height', cell - 1);
      rect.setAttribute('fill', '#333'); svg.appendChild(rect);
    }
  }
}

function drawShareQR(seed) {
  const svg = document.getElementById('share-qr');
  svg.innerHTML = '';
  const n = 13, size = 160, cell = Math.floor(size / n);
  let h = 0;
  for (let i = 0; i < seed.length; i++) h = ((h << 5) - h) + seed.charCodeAt(i);
  for (let r = 0; r < n; r++) for (let c = 0; c < n; c++) {
    const corner = (r < 3 && c < 3) || (r < 3 && c > n - 4) || (r > n - 4 && c < 3);
    if (corner || !!(Math.abs(h ^ (r * 19 + c * 37)) % 2)) {
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', c * cell + 1); rect.setAttribute('y', r * cell + 1);
      rect.setAttribute('width', cell - 1); rect.setAttribute('height', cell - 1);
      rect.setAttribute('fill', '#2C2C2A'); svg.appendChild(rect);
    }
  }
}

// ============================================================
// 画面制御・一覧表示
// ============================================================
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if (tab === 'received') {
    document.getElementById('ticket-list').innerHTML = '<div class="empty">📬<br>受け取ったチケットはまだありません</div>';
  } else {
    renderTicketList();
  }
}

function renderTicketList() {
  const list = document.getElementById('ticket-list');
  list.innerHTML = '';
  if (tickets.length === 0) {
    list.innerHTML = '<div class="empty">チケットがありません<br>+ ボタンで作成しましょう</div>';
    return;
  }
  tickets.forEach((t, i) => {
    const remain = t.total - t.used;
    const div = document.createElement('div');
    div.className = 'ticket-card';
    div.style.background = `linear-gradient(135deg,${COLOR_GRADS[t.color][0]},${COLOR_GRADS[t.color][1]})`;
    div.onclick = () => openDetail(i);
    if (t.imgData) {
      const img = document.createElement('img');
      img.className = 'tc-img'; img.src = t.imgData;
      div.appendChild(img);
    }
    const content = document.createElement('div');
    content.className = 'tc-content';
    const expiryStr = t.expiry ? t.expiry : '無制限';
    content.innerHTML = `
      <div class="ticket-title">${t.title}</div>
      <div class="ticket-sub">${t.desc || '有効期限: ' + expiryStr}</div>
      <div class="ticket-footer">
        <span style="font-size:12px;opacity:0.85">残り ${remain} / ${t.total} 枚</span>
        <span class="ticket-badge" style="${remain === 0 ? 'background:rgba(255,255,255,0.15)' : ''}">${remain === 0 ? '使用済' : '有効'}</span>
      </div>`;
    div.appendChild(content);
    list.appendChild(div);
  });
  document.getElementById('home-count').textContent = tickets.length + '枚';
}

function openCreate() {
  newCount = 1; selectedColor = 0;
  document.getElementById('count-display').textContent = 1;
  document.getElementById('new-title').value = '';
  document.getElementById('new-desc').value = '';
  document.getElementById('new-expiry').value = '';
  document.getElementById('ai-prompt').value = '';
  document.getElementById('ai-status').textContent = '';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  document.querySelectorAll('.color-dot').forEach((d, i) => d.classList.toggle('selected', i === 0));
  setTool('draw');
  showScreen('create-screen');
}

function goHome() { renderTicketList(); showScreen('home-screen'); }
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ============================================================
// ローカルストレージ保存（データ永続化 ※画像データ除く）
// ============================================================
function saveTickets() {
  try {
    const slim = tickets.map(t => ({ ...t, imgData: null }));
    localStorage.setItem('tickets', JSON.stringify(slim));
  } catch (e) {}
}

function loadTickets() {
  try {
    const saved = localStorage.getItem('tickets');
    if (saved) tickets = JSON.parse(saved);
  } catch (e) {}
}

// ============================================================
// 初期化
// ============================================================
loadTickets();
renderTicketList();
